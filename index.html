<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuratore Lenti</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fa;
  margin: 0;
  padding: 15px;
}

.container {
  max-width: 900px;
  margin: auto;
}

h2 {
  text-align: center;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.grid-4 {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

label {
  font-size: 12px;
  color: #666;
}

input {
  width: 100%;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: #1976d2;
  color: white;
  cursor: pointer;
}

#result {
  margin-top: 15px;
  padding: 15px;
  background: #e3f2fd;
  border-radius: 8px;
}

@media (max-width: 600px) {
  .grid, .grid-4 {
    grid-template-columns: 1fr 1fr;
  }
}
</style>
</head>

<body>

<div class="container">

<h2>Configuratore Lenti v1.2</h2>

<!-- PRESCRIZIONE -->
<div class="card">
  <h3>Prescrizione</h3>
  <div class="grid">
    <div><label>OD SPH (Sfera)</label><input type="number" step="0.25" id="od_sph"></div>
    <div><label>CYL (Cilindro)</label><input type="number" step="0.25" id="od_cyl"></div>
    <div><label>AX (Asse)</label><input type="number" step="1" id="od_axis"></div>

    <div><label>OS SPH (Sfera)</label><input type="number" step="0.25" id="os_sph"></div>
    <div><label>CYL (Cilindro)</label><input type="number" step="0.25" id="os_cyl"></div>
    <div><label>AX (Asse)</label><input type="number" step="1" id="os_axis"></div>
  </div>
</div>

<!-- PARAMETRI -->
<div class="card">
  <h3>Parametri</h3>
  <div class="grid">
    <div><label>ADD (Addizione)</label><input type="number" step="0.25" id="add"></div>
    <div><label>Prisma</label><input type="number" step="0.25" id="prism"></div>
  </div>
</div>

<!-- MONTATURA -->
<div class="card">
  <h3>Montatura</h3>
  <div class="grid-4">
    <div>
      <label>A (Calibro orizzontale lente)</label>
      <input type="number" step="1" id="frame_a">
    </div>

    <div>
      <label>DBL (Distanza tra le lenti / ponte)</label>
      <input type="number" step="1" id="frame_dbl">
    </div>

    <div>
      <label>PD (Distanza interpupillare)</label>
      <input type="number" step="1" id="pd">
    </div>

    <div>
      <label>H (Altezza montaggio)</label>
      <input type="number" step="1" id="height">
    </div>
  </div>
</div>

<button onclick="calcola()">Calcola</button>

<div id="result"></div>

</div>

<script src="lensEngine.js?v=2"></script>

<script>
function val(id) {
  const v = parseFloat(document.getElementById(id).value);
  return isNaN(v) ? 0 : v;
}

function calcola() {

  const params = {
    od_sph: val("od_sph"),
    od_cyl: val("od_cyl"),
    od_axis: val("od_axis"),
    os_sph: val("os_sph"),
    os_cyl: val("os_cyl"),
    os_axis: val("os_axis"),
    add: val("add"),
    prism: val("prism"),
    A: val("frame_a"),
    DBL: val("frame_dbl"),
    PD: val("pd"),
    height: val("height")
  };

  const r = lensEngine(params);

  document.getElementById("result").innerHTML =
    "SE: " + r.se + "<br>" +
    "Decentramento: " + r.decentration + " mm<br>" +
    "Diametro: " + r.mbs + " mm<br>" +
    "Design: " + r.design + "<br>" +
    "Indice: " + r.index + "<br>" +
    "Spessore: " + r.edgeThickness + " mm";
}
</script>

</body>
</html>
