<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuratore Lenti</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fa;
  padding: 15px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 15px;
  border-radius: 10px;
}

.grid { display: grid; grid-template-columns: repeat(3,1fr); gap:10px;}
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap:10px;}

input {
  width:100%;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#1976d2;
  color:white;
  border:none;
  border-radius:8px;
}

#result {
  margin-top:15px;
  background:#e3f2fd;
  padding:15px;
  border-radius:8px;
}

/* SELECTOR */
.selector {
  display:none;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-top:15px;
}

.arrow {
  width:40px;
  height:40px;
  background:#1976d2;
  color:white;
  border:none;
  border-radius:6px;
}

.option-box {
  background:white;
  padding:10px;
  border-radius:8px;
  font-weight:bold;
}

.badge {
  background:#1976d2;
  color:white;
  font-size:11px;
  padding:2px 6px;
  border-radius:5px;
  margin-left:6px;
}

.mini-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 10px;
}

.mini-card {
  text-align: center;
  padding: 6px;
  border-radius: 8px;
  font-size: 11px;
  background: #f0f0f0;
  cursor: pointer;
}

.mini-card.best {
  background: #e8f5e9;
  font-weight: bold;
  transform: scale(1.05);
}

.mini-icon {
  font-size: 16px;
}

.mini-title {
  font-size: 11px;
}

.mini-desc {
  font-size: 10px;
  color: #555;
}

</style>
</head>

<body>

<script>
  const passwordCorretta = "Moriero1";

  const userInput = prompt("Inserisci la password:");

  if (userInput !== passwordCorretta) {
    document.body.innerHTML = "<h1>Accesso negato</h1>";
  }
</script>

<div class="container">

<h2>Configuratore Lenti v2.5</h2>

<div class="card">
<h3>Prescrizione</h3>
<div class="grid">

<div>
<label id="lbl_od_sph">OD</label>
<input type="number" step="0.25" id="od_sph">
</div>

<div>
<label id="lbl_od_cyl">CYL</label>
<input type="number" step="0.25" id="od_cyl">
</div>

<div>
<label id="lbl_od_axis">AX</label>
<input type="number" step="1" id="od_axis">
</div>

<div>
<label id="lbl_os_sph">OS</label>
<input type="number" step="0.25" id="os_sph">
</div>

<div>
<label id="lbl_os_cyl">CYL</label>
<input type="number" step="0.25" id="os_cyl">
</div>

<div>
<label id="lbl_os_axis">AX</label>
<input type="number" step="1" id="os_axis">
</div>

</div></div>

<div class="card">
<h3>Parametri</h3>
<div class="grid">
<input type="number" step="0.25" id="add">
<input type="number" step="0.25" id="prism">
</div>
</div>

<div class="card">
<h3>Montatura</h3>
<div class="grid-4">
<input type="number" id="frame_a">
<input type="number" id="frame_dbl">
<input type="number" id="pd">
<input type="number" id="height">
</div>
</div>

<button onclick="calcola()">Calcola</button>

<div id="result"></div>

<!-- 🔥 SELETTORE LENTE -->
<div class="selector" id="selector">
<button class="arrow" onclick="prevOption()">&lt;</button>

<div class="option-box">
<span id="optionLabel"></span>
</div>

<button class="arrow" onclick="nextOption()">&gt;</button>
</div>

<div id="optionsMiniGrid" class="mini-grid">
</div>

</div>

<script src="lensEngine.js?v=3"></script>

<script>

let options = [];
let currentIndex = 0;
let lastParams = {};

// 🌍 MULTILINGUA
const lang = navigator.language.startsWith("it") ? "it" : "en";

const labels = {
  it: {
    od_sph: "Sfera OD",
    od_cyl: "Cilindro OD",
    od_axis: "Asse OD",
    os_sph: "Sfera OS",
    os_cyl: "Cilindro OS",
    os_axis: "Asse OS",
    add: "Addizione",
    prism: "Prisma",
    frame_a: "Calibro (A)",
    frame_dbl: "Ponte (DBL)",
    pd: "Distanza interpupillare",
    height: "Altezza montaggio"
  },
  en: {
    od_sph: "Sphere OD",
    od_cyl: "Cylinder OD",
    od_axis: "Axis OD",
    os_sph: "Sphere OS",
    os_cyl: "Cylinder OS",
    os_axis: "Axis OS",
    add: "Addition",
    prism: "Prism",
    frame_a: "Lens width (A)",
    frame_dbl: "Bridge (DBL)",
    pd: "Pupillary distance",
    height: "Fitting height"
  }
};

function setPlaceholders() {
  const t = labels[lang];

  Object.keys(t).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.placeholder = t[id];
  });
}

function setLabels() {
  const t = labels[lang];

  const map = {
    lbl_od_sph: t.od_sph,
    lbl_od_cyl: t.od_cyl,
    lbl_od_axis: t.od_axis,
    lbl_os_sph: t.os_sph,
    lbl_os_cyl: t.os_cyl,
    lbl_os_axis: t.os_axis
  };

  for (const id in map) {
    const el = document.getElementById(id);
    if (el) el.innerText = map[id];
  }
}

window.onload = () => {
  setPlaceholders();
  setLabels();
};

function val(id){
  const v=parseFloat(document.getElementById(id).value);
  return isNaN(v)?0:v;
}

function generaOpzioni(){
  return [
    {
      index:1.5,
      design:"Standard",
      tag:"economica",
      desc:"Soluzione base, adatta a correzioni leggere con un costo contenuto."
    },
    {
      index:1.6,
      design:"Asferico",
      tag:"consigliata",
      desc:"Buon equilibrio tra estetica e comfort, con riduzione dello spessore rispetto allo standard."
    },
    {
      index:1.67,
      design:"Atorico",
      tag:"premium",
      desc:"Migliore qualità visiva e minori distorsioni laterali, ideale per correzioni più elevate."
    },
    {
      index:1.74,
      design:"Freeform",
      tag:"top",
      desc:"Massima sottigliezza e prestazioni ottiche personalizzate, per il miglior risultato possibile."
    },

    // 🔵 NUOVE MULTIFOCALI
    {
      index:1.6,
      design:"Progressivo",
      tag:"consigliata",
      desc:"Lente multifocale per visione a tutte le distanze."
    },
    {
      index:1.67,
      design:"Progressivo corto",
      tag:"premium",
      desc:"Adatta a montature basse con corridoio ridotto."
    },
    {
      index:1.74,
      design:"Progressivo comfort",
      tag:"top",
      desc:"Massimo comfort visivo con campi più ampi."
    }
  ];
}

function generaSpiegazione(opt, params, r) {


  let testo = opt.desc;

  const se = Math.abs(r.se);

  // SOLO per lenti sottili
  if (se > 4 && opt.index >= 1.67) {
    testo += " In questo caso specifico, questa lente aiuta a ridurre lo spessore.";
  }

  // SOLO se lente NON adeguata
  if (se > 4 && opt.index < 1.6) {
    testo += " Questa soluzione potrebbe risultare più spessa esteticamente.";
  }

  // diametro grande
  if (r.mbs > 65 && opt.index >= 1.67) {
    testo += " Il diametro elevato rende vantaggioso un indice più sottile.";
  }

  // montatura grande
  if (params.A > 55 && opt.index < 1.6) {
    testo += " La montatura ampia può aumentare lo spessore percepito.";
  }

  return testo;
}

function shortDesc(text) {
  return text.split(",")[0];
}

function getIcon(tag) {
  if (tag === "economica") return "💰";
  if (tag === "consigliata") return "⚖️";
  if (tag === "premium") return "🎯";
  if (tag === "top") return "👑";
  return "";
}

function renderMiniOptions() {

  const container = document.getElementById("optionsMiniGrid");
  container.innerHTML = "";

  const filtered = options.filter(opt => {
    if (lastParams.isProgressive) {
      return opt.design.includes("Progressivo");
    } else {
      return !opt.design.includes("Progressivo");
    }
  });

  filtered.forEach((opt, i) => {

    const realIndex = options.indexOf(opt);
    const isBest = realIndex === currentIndex;

    const div = document.createElement("div");
    div.className = "mini-card" + (isBest ? " best" : "");

    div.innerHTML = `
      <div class="mini-icon">${getIcon(opt.tag)}</div>
      <div class="mini-title">${opt.design} ${opt.index}</div>
      <div class="mini-desc">${shortDesc(opt.desc)}</div>
    `;

    div.onclick = () => {
      currentIndex = realIndex;
      mostraOpzione();
    };

    container.appendChild(div);
  });
}
function mostraOpzione(){
  const opt = options[currentIndex];

  // 👉 PRIMA calcolo
  const r = lensEngine({
    ...lastParams,
    forcedIndex: opt.index,
    forcedDesign: opt.design
  });

  // 👉 POI UI
  let extra = "";

// 👉 lente migliore
if (window.bestReason && currentIndex === window.bestIndex) {
  extra = "<div style='color:#2e7d32;font-size:11px;margin-top:6px;'>✔ Scelta ottimizzata per " + window.bestReason + ".</div>";
}

// 👉 lente NON ottimale
if (currentIndex !== window.bestIndex) {
  extra += "<div style='color:#d32f2f;font-size:11px;margin-top:6px;'>⚠ Non è la soluzione ottimale per questo caso.</div>";
}

document.getElementById("optionLabel").innerHTML =
  opt.design + " - " + opt.index +
  " <span class='badge'>" + opt.tag + "</span>" +
  "<div style='font-size:12px;color:#555;margin-top:6px;'>" +
  generaSpiegazione(opt, lastParams, r) +
  "</div>" +
  extra;

  document.getElementById("result").innerHTML =
    "SE: " + r.se + "<br>" +
    "Decentramento: " + r.decentration + " mm<br>" +
    "Diametro: " + r.mbs + " mm<br>" +
    "Design: " + opt.design + "<br>" +
    "Indice: " + opt.index + "<br>" +
    "Spessore: " + r.edgeThickness + " mm";
	
renderMiniOptions();
}
function nextOption(){
  currentIndex=(currentIndex+1)%options.length;
  mostraOpzione();
}

function prevOption(){
  currentIndex=(currentIndex-1+options.length)%options.length;
  mostraOpzione();
}

function calcola(){

  lastParams = {
    od_sph: val("od_sph"),
    od_cyl: val("od_cyl"),
    od_axis: val("od_axis"),
    os_sph: val("os_sph"),
    os_cyl: val("os_cyl"),
    os_axis: val("os_axis"),
    add: val("add"),
    prism: val("prism"),
    A: val("frame_a"),
    DBL: val("frame_dbl"),
    PD: val("pd"),
    height: val("height")
  };

  lastParams.isProgressive = lastParams.add > 0.75;

  const baseResult = lensEngine(lastParams);

  const best = scegliLenteMigliore(lastParams, baseResult);

  window.bestReason = best.upgradeReason;

  // 👉 GENERA OPZIONI
  options = generaOpzioni();

  // 👉 trova migliore
  currentIndex = options.findIndex(o =>
    o.index === best.index && o.design === best.design
  );

  if (currentIndex === -1) currentIndex = 1;

  window.bestIndex = currentIndex;

  // 👉 mostra UI
  document.getElementById("selector").style.display="flex";

  mostraOpzione();
}
function scegliLenteMigliore(params, r) {

  const se = Math.abs(r.se);

  const cylOD = Math.abs(params.od_cyl);
  const cylOS = Math.abs(params.os_cyl);
  const maxCyl = Math.max(cylOD, cylOS);

  let index = 1.5;
  let design = "Standard";
  let tag = "economica";
  let upgradeReason = null;

  // 🔵 MULTIFOCALE
 if (params.isProgressive) {

    index = 1.6;
    design = "Progressivo";
    tag = "consigliata";
    upgradeReason = "visione multifocale";

    if (se > 4) {
      index = 1.67;
      tag = "premium";
    }

    if (se > 6 || r.mbs > 65) {
      index = 1.74;
      tag = "top";
    }

    // 👉 altezza montatura
   if (params.height > 0 && params.height < 16) {
  design = "Progressivo corto";
  index = 1.67; // 🔥 allineato
  tag = "premium";
  upgradeReason = "montatura bassa";
}

if (params.height >= 18) {
  design = "Progressivo comfort";
  index = 1.74; // 🔥 allineato
  tag = "top";
}

    return { index, design, tag, upgradeReason };
  }

  // 🟢 MONOFOCALE (logica attuale migliorata)

  if (se > 2) {
    index = 1.6;
    design = "Asferico";
    tag = "consigliata";
  }

  if (se > 4) {
    index = 1.67;
    design = "Atorico";
    tag = "premium";
  }

  if (se > 6 || r.mbs > 65) {
    index = 1.74;
    design = "Freeform";
    tag = "top";
  }

  // astigmatismo
  if (maxCyl >= 1.5 && design === "Standard") {
    design = "Asferico";
    tag = "consigliata";
    upgradeReason = "astigmatismo";
  }

  if (maxCyl >= 2.5) {
    design = "Atorico";
    tag = "premium";
    upgradeReason = "astigmatismo elevato";
  }

  if (maxCyl >= 3.5) {
    design = "Freeform";
    tag = "top";
    upgradeReason = "astigmatismo molto elevato";
  }

  return { index, design, tag, upgradeReason };
}

</script>

</body>
</html>
