<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Configuratore Lenti</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    padding: 20px;
    max-width: 900px;
    margin: auto;
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  h3 {
    margin-top: 30px;
    border-bottom: 1px solid #ddd;
    padding-bottom: 5px;
  }

  .card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    margin-top: 15px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .grid-4 {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  label {
    font-size: 12px;
    color: #666;
  }

  input {
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  input:focus {
    outline: none;
    border-color: #1976d2;
  }

  button {
    margin-top: 20px;
    padding: 12px;
    width: 100%;
    background: #1976d2;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
  }

  button:hover {
    background: #1565c0;
  }

  img {
    width: 100%;
    border-radius: 8px;
    margin-top: 10px;
  }

  #result {
    margin-top: 20px;
    padding: 15px;
    background: #e3f2fd;
    border-radius: 8px;
  }
</style>
</head>

<body>

<h2>Configuratore Lenti</h2>

<div class="card">
  <h3>Carica ricetta</h3>
  <input type="file" id="fileInput" accept="image/*">
  <img id="preview">
  <button onclick="leggiAI()">🤖 Lettura automatica (AI)</button>
</div>

<div class="card">
  <h3>Prescrizione</h3>

  <div class="grid">
    <div>
      <label>OD SPH</label>
      <input id="od_sph" placeholder="-2.50">
    </div>
    <div>
      <label>CYL</label>
      <input id="od_cyl" placeholder="-1.00">
    </div>
    <div>
      <label>AX</label>
      <input id="od_axis" placeholder="90">
    </div>

    <div>
      <label>OS SPH</label>
      <input id="os_sph" placeholder="-2.50">
    </div>
    <div>
      <label>CYL</label>
      <input id="os_cyl" placeholder="-1.00">
    </div>
    <div>
      <label>AX</label>
      <input id="os_axis" placeholder="90">
    </div>
  </div>
</div>

<div class="card">
  <h3>Parametri</h3>

  <div class="grid">
    <div>
      <label>ADD</label>
      <input id="add" placeholder="1.50">
    </div>
    <div>
      <label>Prisma</label>
      <input id="prism" placeholder="0.00">
    </div>
  </div>
</div>

<div class="card">
  <h3>Montatura</h3>

  <div class="grid-4">
    <div>
      <label>A</label>
      <input id="frame_a" placeholder="52">
    </div>
    <div>
      <label>DBL</label>
      <input id="frame_dbl" placeholder="18">
    </div>
    <div>
      <label>PD</label>
      <input id="pd" placeholder="62">
    </div>
    <div>
      <label>Altezza</label>
      <input id="height" placeholder="22">
    </div>
  </div>
</div>

<button onclick="calcola()">Calcola</button>

<div id="result"></div>

<script src="lensEngine.js"></script>

<script>
fileInput.onchange = () => {
  const file = fileInput.files[0];
  if (file) preview.src = URL.createObjectURL(file);
};

function leggiAI() {
  alert("Funzione AI in fase di sistemazione");
}

function calcola() {
  const params = {
    od_sph: parseFloat(od_sph.value),
    od_cyl: parseFloat(od_cyl.value),
    od_axis: parseFloat(od_axis.value),
    os_sph: parseFloat(os_sph.value),
    os_cyl: parseFloat(os_cyl.value),
    os_axis: parseFloat(os_axis.value),
    add: parseFloat(add.value),
    prism: parseFloat(prism.value),
    A: parseFloat(frame_a.value),
    DBL: parseFloat(frame_dbl.value),
    PD: parseFloat(pd.value),
    height: parseFloat(height.value)
  };

  const r = lensEngine(params);

  result.innerHTML =
    "SE: " + r.se + "<br>" +
    "Decentramento: " + r.decentration + " mm<br>" +
    "Diametro: " + r.mbs + " mm<br>" +
    "Corridoio: " + r.corridor + " mm<br>" +
    "Design: " + r.design + "<br>" +
    "Indice: " + r.index + "<br><br>" +
    "Spessore bordo stimato: " + r.edgeThickness + " mm";
}
</script>

</body>
</html>
