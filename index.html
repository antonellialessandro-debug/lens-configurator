<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Configuratore Lenti</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    input {
      margin: 5px 0;
      padding: 5px;
      width: 100%;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    img {
      max-width: 100%;
      margin-top: 10px;
      border-radius: 6px;
    }

    .section {
      margin-top: 25px;
    }
  </style>
</head>
<body>

<h2>Configuratore Lenti</h2>

<div class="section">
  <h3>Carica ricetta</h3>
  <input type="file" id="fileInput" accept="image/*">
  <img id="preview">
  <button onclick="leggiAI()">🤖 Leggi automaticamente (AI)</button>
</div>

<div class="section">
  <h3>Prescrizione</h3>

  OD SPH <input id="od_sph">
  CYL <input id="od_cyl">
  AX <input id="od_axis">

  OS SPH <input id="os_sph">
  CYL <input id="os_cyl">
  AX <input id="os_axis">
</div>

<div class="section">
  <h3>Parametri</h3>
  ADD <input id="add">
  Prisma <input id="prism">
</div>

<div class="section">
  <h3>Montatura</h3>
  A <input id="frame_a">
  DBL <input id="frame_dbl">
  PD <input id="pd">
  Altezza <input id="height">
</div>

<button onclick="calcola()">Calcola</button>

<div id="result"></div>

<script src="lensEngine.js"></script>

<script>
// PREVIEW IMMAGINE
fileInput.onchange = () => {
  const file = fileInput.files[0];
  if (file) {
    preview.src = URL.createObjectURL(file);
  }
};

// 🔥 COMPRESSIONE IMMAGINE (FIX PRINCIPALE)
async function compressImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();

    reader.onload = function (event) {
      const img = new Image();

      img.onload = function () {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        const maxWidth = 800;
        const scale = maxWidth / img.width;

        canvas.width = maxWidth;
        canvas.height = img.height * scale;

        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        resolve(canvas.toDataURL("image/jpeg", 0.7));
      };

      img.src = event.target.result;
    };

    reader.readAsDataURL(file);
  });
}

// 🚀 AI LETTURA
async function leggiAI() {
  const file = fileInput.files[0];
  if (!file) return alert("Carica una ricetta");

  const image = await compressImage(file);

  const res = await fetch("/.netlify/functions/parse-prescription", {
    method: "POST",
    body: JSON.stringify({ image })
  });

  const text = await res.text();

  console.log("AI RESULT:", text);

  try {
    const data = JSON.parse(text);

    od_sph.value = data.od?.sph ?? "";
    od_cyl.value = data.od?.cyl ?? "";
    od_axis.value = data.od?.axis ?? "";

    os_sph.value = data.os?.sph ?? "";
    os_cyl.value = data.os?.cyl ?? "";
    os_axis.value = data.os?.axis ?? "";

    add.value = data.add ?? "";

    alert("✅ Ricetta interpretata automaticamente");

  } catch (e) {
    console.error("Errore parsing:", e);
    alert("Errore AI");
  }
}

// CALCOLO
function calcola() {
  const params = {
    od_sph: parseFloat(od_sph.value),
    od_cyl: parseFloat(od_cyl.value),
    od_axis: parseFloat(od_axis.value),
    os_sph: parseFloat(os_sph.value),
    os_cyl: parseFloat(os_cyl.value),
    os_axis: parseFloat(os_axis.value),
    add: parseFloat(add.value),
    prism: parseFloat(prism.value),
    A: parseFloat(frame_a.value),
    DBL: parseFloat(frame_dbl.value),
    PD: parseFloat(pd.value),
    height: parseFloat(height.value)
  };

  const r = lensEngine(params);

  result.innerHTML =
    "SE: " + r.se + "<br>" +
    "Decentramento: " + r.decentration + " mm<br>" +
    "Diametro: " + r.mbs + " mm<br>" +
    "Corridoio: " + r.corridor + " mm<br>" +
    "Design: " + r.design + "<br>" +
    "Indice: " + r.index + "<br><br>" +
    "Spessore bordo stimato: " + r.edgeThickness + " mm";
}
</script>

</body>
</html>
