<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Configuratore Lenti</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fa;
  padding: 20px;
}

.container {
  max-width: 800px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h2 { text-align: center; }

h3 {
  margin-top: 20px;
  border-bottom: 1px solid #eee;
  padding-bottom: 5px;
}

.row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.field {
  flex: 1;
  min-width: 120px;
}

label {
  font-size: 13px;
}

input {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

.error {
  border: 2px solid red;
}

small {
  color: gray;
  font-size: 11px;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

.result {
  margin-top: 25px;
  padding: 20px;
  background: #f9fafc;
  border-radius: 10px;
}

.highlight {
  background: #e8f4ff;
  padding: 10px;
  border-radius: 8px;
}

.price { font-size: 18px; font-weight: bold; }
.old-price { text-decoration: line-through; color: gray; }
</style>
</head>

<body>

<div class="container">

<h2>Configuratore Lenti</h2>

<h3>Prescrizione</h3>

<div class="row">
  <div class="field">
    <label title="Valore sferico in diottrie">OD SPH</label>
    <input id="od_sph" type="number" step="0.25" placeholder="-2.50">
  </div>

  <div class="field">
    <label title="Cilindro (astigmatismo)">CYL</label>
    <input id="od_cyl" type="number" step="0.25" placeholder="-1.00">
  </div>

  <div class="field">
    <label title="Asse dell'astigmatismo">AX</label>
    <input id="od_axis" type="number" min="0" max="180" placeholder="90">
  </div>
</div>

<div class="row">
  <div class="field">
    <label>OS SPH</label>
    <input id="os_sph" type="number" step="0.25" placeholder="-2.50">
  </div>

  <div class="field">
    <label>CYL</label>
    <input id="os_cyl" type="number" step="0.25" placeholder="-1.00">
  </div>

  <div class="field">
    <label>AX</label>
    <input id="os_axis" type="number" min="0" max="180" placeholder="90">
  </div>
</div>

<h3>Parametri</h3>

<div class="row">
  <div class="field">
    <label title="Addizione per vicino">ADD</label>
    <input id="add" type="number" step="0.25" placeholder="1.50">
  </div>

  <div class="field">
    <label title="Prisma integrato">Prisma</label>
    <input id="prism" type="number" step="0.25" placeholder="0.00">
  </div>
</div>

<h3>Montatura</h3>

<div class="row">
  <div class="field">
    <label>A (calibro)</label>
    <input id="frame_a" type="number" placeholder="52">
  </div>

  <div class="field">
    <label>DBL (ponte)</label>
    <input id="frame_dbl" type="number" placeholder="18">
  </div>

  <div class="field">
    <label>PD</label>
    <input id="pd" type="number" placeholder="62">
  </div>

  <div class="field">
    <label>Altezza</label>
    <input id="height" type="number" placeholder="22">
  </div>
</div>

<button onclick="calcola()">Calcola</button>

<div id="result" class="result"></div>

</div>

<script src="lensEngine.js"></script>

<script>
function validate() {
  let valid = true;

  document.querySelectorAll("input").forEach(i => {
    i.classList.remove("error");

    if (i.value === "" || isNaN(i.value)) {
      i.classList.add("error");
      valid = false;
    }
  });

  // validazione intelligente cilindro/asse
  if (Math.abs(od_cyl.value) > 0 && od_axis.value === "") {
    od_axis.classList.add("error");
    valid = false;
  }

  if (Math.abs(os_cyl.value) > 0 && os_axis.value === "") {
    os_axis.classList.add("error");
    valid = false;
  }

  return valid;
}

function calcola() {

  if (!validate()) {
    result.innerHTML = "⚠️ Controlla i campi evidenziati";
    return;
  }

  const params = {
    od_sph: parseFloat(od_sph.value),
    od_cyl: parseFloat(od_cyl.value),
    od_axis: parseFloat(od_axis.value),

    os_sph: parseFloat(os_sph.value),
    os_cyl: parseFloat(os_cyl.value),
    os_axis: parseFloat(os_axis.value),

    add: parseFloat(add.value),
    prism: parseFloat(prism.value),

    A: parseFloat(frame_a.value),
    DBL: parseFloat(frame_dbl.value),
    PD: parseFloat(pd.value),
    height: parseFloat(height.value)
  };

  fetch("lenses.json")
    .then(res => res.json())
    .then(data => {

      const r = lensEngine(params);
      const lens = data.lenses.find(l => l.type === r.recommended);

      let base = lens.base_price;
      let final = applyDiscount(base, lens.discounts);

      result.innerHTML = `
        <div class="highlight">
          ⭐ <b>Lente consigliata</b><br>
          ${lens.name}<br><br>

          <span class="old-price">€${base}</span><br>
          <span class="price">€${final}</span>
        </div>

        <b>Motivazione:</b><br>
        - Potere: ${r.se}<br>
        - Ottimizzazione spessore<br><br>

        <b>Dati tecnici:</b><br>
        Diametro: ${r.mbs} mm<br>
        Corridoio: ${r.corridor} mm<br>
        Spessore: ${r.edgeThickness} mm<br><br>
      `;

    });
}
</script>

</body>
</html>
